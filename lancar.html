<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apontamento de Produção — Lançar</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f7fa; --card-bg: #ffffff; --border: #e2e6ec; --text: #1f2937; --text-dim: #6b7280;
    --primary: #1f4e78; --primary-light: #2e6da4; --green: #1a9c5c; --green-bg: #e8f8f0;
    --red: #d0342c; --red-bg: #fdeceb; --amber: #b8860b; --amber-bg: #fdf3e0;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:"Segoe UI", Arial, sans-serif; font-size:15px; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  h1 { font-size: 19px; color: var(--primary); margin: 0 0 4px; }
  .subtitle { color: var(--text-dim); margin: 0 0 16px; font-size: 12.5px; }
  .subtitle a { color: var(--primary-light); text-decoration: none; }
  .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
  .tab-btn { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 9px 4px; font-size: 12px; font-weight: 700; color: var(--text-dim); cursor: pointer; text-align: center; }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px 18px 20px; margin-bottom: 16px; }
  .panel h2 { font-size: 15px; margin: 0 0 14px; color: var(--primary); }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 11px; border: 1px solid var(--border); border-radius: 7px;
    font-size: 15px; font-family: inherit; background: #fff; color: var(--text);
  }
  .field textarea { resize: vertical; min-height: 54px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .check-row input[type=checkbox] { width: 18px; height: 18px; }
  .check-row label { font-size: 13.5px; font-weight: 600; color: var(--text); margin: 0; }
  .qty-inline { margin-top: -4px; margin-bottom: 13px; }
  .hidden { display: none !important; }
  button.submit { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  button.submit:active { background: var(--primary-light); }
  button.submit:disabled { opacity: 0.55; }
  .msg { margin-top: 12px; padding: 10px 12px; border-radius: 7px; font-size: 13px; font-weight: 600; }
  .msg.ok { background: var(--green-bg); color: var(--green); }
  .msg.err { background: var(--red-bg); color: var(--red); }
  .empty-note { color: var(--text-dim); font-size: 13px; padding: 6px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Lançar Apontamento</h1>
  <p class="subtitle">Sistema de Apontamento de Produção — Bela Vista · <a href="/">ver painel de visualização</a></p>

  <div class="tabs">
    <div class="tab-btn active" data-tab="iniciar_ordem" onclick="switchTab('iniciar_ordem')">Iniciar<br>Ordem</div>
    <div class="tab-btn" data-tab="finalizar_ordem" onclick="switchTab('finalizar_ordem')">Finalizar<br>Ordem</div>
    <div class="tab-btn" data-tab="iniciar_parada" onclick="switchTab('iniciar_parada')">Iniciar<br>Parada</div>
    <div class="tab-btn" data-tab="encerrar_parada" onclick="switchTab('encerrar_parada')">Encerrar<br>Parada</div>
  </div>

  <!-- INICIAR ORDEM -->
  <div class="panel tab-panel" id="panel-iniciar_ordem">
    <h2>Iniciar Ordem de Produção</h2>
    <form id="form-iniciar_ordem" onsubmit="return submitForm(event,'iniciar_ordem')">
      <div class="field"><label>Nº OP *</label><input type="text" name="opNumero" required></div>
      <div class="row2">
        <div class="field"><label>Máquina *</label><select name="maquina" required></select></div>
        <div class="field"><label>Turno *</label><select name="turno" required></select></div>
      </div>
      <div class="field"><label>Produto</label><input type="text" name="produto"></div>
      <div class="row2">
        <div class="field"><label>Qtd Planejada (sacos)</label><input type="number" name="qtdPlanejada" min="0"></div>
        <div class="field"><label>Tempo Necessário (h)</label><input type="number" name="tempoNecessario" min="0" step="0.1"></div>
      </div>
      <div class="field"><label>Hora Início</label><input type="time" name="horaInicio"></div>
      <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>
      <button class="submit" type="submit">Iniciar Ordem</button>
      <div class="msg hidden" id="msg-iniciar_ordem"></div>
    </form>
  </div>

  <!-- FINALIZAR ORDEM -->
  <div class="panel tab-panel hidden" id="panel-finalizar_ordem">
    <h2>Finalizar Ordem de Produção</h2>
    <form id="form-finalizar_ordem" onsubmit="return submitForm(event,'finalizar_ordem')">
      <div class="field"><label>Ordem em produção *</label><select name="notionId" id="select-ordens" required></select></div>
      <div class="row2">
        <div class="field"><label>Hora Término</label><input type="time" name="horaTermino"></div>
        <div class="field"><label>Qtd Real (sacos)</label><input type="number" name="qtdReal" min="0"></div>
      </div>
      <div class="field"><label>Tempo Real (h)</label><input type="number" name="tempoReal" min="0" step="0.1"></div>
      <div class="check-row"><input type="checkbox" id="refugo-check" onchange="toggleQty('refugo')"><label for="refugo-check">Houve Refugo</label></div>
      <div class="field qty-inline hidden" id="refugo-qty-wrap"><label>Qtd Refugo (sacos)</label><input type="number" name="qtdRefugo" min="0"></div>
      <input type="hidden" name="refugo" id="refugo-hidden" value="false">
      <div class="check-row"><input type="checkbox" id="bags-check" onchange="toggleQty('bags')"><label for="bags-check">Gerou Bags</label></div>
      <div class="field qty-inline hidden" id="bags-qty-wrap"><label>Qtd Bags (unidades)</label><input type="number" name="qtdBags" min="0"></div>
      <input type="hidden" name="bags" id="bags-hidden" value="false">
      <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>
      <button class="submit" type="submit">Finalizar Ordem</button>
      <div class="msg hidden" id="msg-finalizar_ordem"></div>
    </form>
  </div>

  <!-- INICIAR PARADA -->
  <div class="panel tab-panel hidden" id="panel-iniciar_parada">
    <h2>Iniciar Parada</h2>
    <form id="form-iniciar_parada" onsubmit="return submitForm(event,'iniciar_parada')">
      <div class="row2">
        <div class="field"><label>Máquina *</label><select name="maquina" required></select></div>
        <div class="field"><label>Turno *</label><select name="turno" required></select></div>
      </div>
      <div class="field"><label>Motivo *</label><select name="motivo" required></select></div>
      <div class="field"><label>Hora Início</label><input type="time" name="horaInicio"></div>
      <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>
      <button class="submit" type="submit">Iniciar Parada</button>
      <div class="msg hidden" id="msg-iniciar_parada"></div>
    </form>
  </div>

  <!-- ENCERRAR PARADA -->
  <div class="panel tab-panel hidden" id="panel-encerrar_parada">
    <h2>Encerrar Parada</h2>
    <form id="form-encerrar_parada" onsubmit="return submitForm(event,'encerrar_parada')">
      <div class="field"><label>Parada em aberto *</label><select name="notionId" id="select-paradas" required></select></div>
      <div class="field"><label>Hora Término</label><input type="time" name="horaTermino"></div>
      <div class="field"><label>Horas Paradas</label><input type="number" name="horasParadas" min="0" step="0.1"></div>
      <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>
      <button class="submit" type="submit">Encerrar Parada</button>
      <div class="msg hidden" id="msg-encerrar_parada"></div>
    </form>
  </div>
</div>

<script>
const MAQUINAS = ["Máquina 00","Máquina 01","Máquina 02","Máquina 03","Máquina 04","Máquina 05","Máquina 06","Máquina Rensaque"];
const TURNOS = ["1º Turno","2º Turno","3º Turno"];
const MOTIVOS = ["Falta de energia","Falta de funcionário","Falta de Matéria-prima","Falta de Mecânico","Falta de Embalagem","Limpeza","Manutenção","Máquina quebrada","Reunião","Saída Médico / Particular","Trator quebrado","Treinamento"];

function fillSelect(sel, options, placeholder) {
  sel.innerHTML = '';
  if (placeholder) {
    const o = document.createElement('option');
    o.value = ''; o.textContent = placeholder; o.disabled = true; o.selected = true;
    sel.appendChild(o);
  }
  options.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function nowHHMM() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

document.querySelectorAll('input[type=time]').forEach(el => el.value = nowHHMM());

document.querySelectorAll('#form-iniciar_ordem select[name=maquina]').forEach(el => fillSelect(el, MAQUINAS, 'Selecione'));
document.querySelectorAll('select[name=turno]').forEach(el => fillSelect(el, TURNOS, 'Selecione'));
document.querySelector('#form-iniciar_parada select[name=maquina]').innerHTML = '';
fillSelect(document.querySelector('#form-iniciar_parada select[name=maquina]'), MAQUINAS, 'Selecione');
fillSelect(document.querySelector('#form-iniciar_parada select[name=motivo]'), MOTIVOS, 'Selecione');

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.id !== 'panel-' + tab));
  if (tab === 'finalizar_ordem' || tab === 'encerrar_parada') loadOpenRecords();
}

function toggleQty(kind) {
  const check = document.getElementById(kind + '-check').checked;
  document.getElementById(kind + '-qty-wrap').classList.toggle('hidden', !check);
  document.getElementById(kind + '-hidden').value = check ? 'true' : 'false';
}

async function loadOpenRecords() {
  const selOrdens = document.getElementById('select-ordens');
  const selParadas = document.getElementById('select-paradas');
  selOrdens.innerHTML = '<option value="" disabled selected>Carregando...</option>';
  selParadas.innerHTML = '<option value="" disabled selected>Carregando...</option>';
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    const ordensAbertas = (data.ordens || []).filter(o => o.status === 'Em Produção');
    const paradasAbertas = (data.paradas || []).filter(p => p.status === 'Em Aberto');

    selOrdens.innerHTML = '';
    if (!ordensAbertas.length) {
      selOrdens.innerHTML = '<option value="" disabled selected>Nenhuma ordem em produção</option>';
    } else {
      const ph = document.createElement('option'); ph.value=''; ph.disabled=true; ph.selected=true; ph.textContent='Selecione a ordem'; selOrdens.appendChild(ph);
      ordensAbertas.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.notionId;
        opt.textContent = `OP ${o.opNumero} — ${o.maquina} — ${o.turno}`;
        selOrdens.appendChild(opt);
      });
    }

    selParadas.innerHTML = '';
    if (!paradasAbertas.length) {
      selParadas.innerHTML = '<option value="" disabled selected>Nenhuma parada em aberto</option>';
    } else {
      const ph = document.createElement('option'); ph.value=''; ph.disabled=true; ph.selected=true; ph.textContent='Selecione a parada'; selParadas.appendChild(ph);
      paradasAbertas.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.notionId;
        opt.textContent = `${p.maquina} — ${p.motivo} — ${p.turno}`;
        selParadas.appendChild(opt);
      });
    }
  } catch (e) {
    selOrdens.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>';
    selParadas.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>';
  }
}

function showMsg(action, ok, text) {
  const el = document.getElementById('msg-' + action);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

async function submitForm(ev, action) {
  ev.preventDefault();
  const form = ev.target;
  const btn = form.querySelector('button.submit');
  const fd = new FormData(form);
  const payload = {};
  fd.forEach((v, k) => { payload[k] = v; });
  if (action === 'iniciar_ordem' || action === 'iniciar_parada') payload.data = todayISO();
  if (action === 'finalizar_ordem') {
    payload.refugo = document.getElementById('refugo-hidden').value === 'true';
    payload.bags = document.getElementById('bags-hidden').value === 'true';
  }
  btn.disabled = true;
  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Falha ao enviar');
    showMsg(action, true, 'Lançado com sucesso.');
    form.reset();
    form.querySelectorAll('input[type=time]').forEach(el => el.value = nowHHMM());
    if (action === 'finalizar_ordem' || action === 'iniciar_ordem') {
      document.getElementById('refugo-qty-wrap')?.classList.add('hidden');
      document.getElementById('bags-qty-wrap')?.classList.add('hidden');
    }
    if (action === 'finalizar_ordem' || action === 'encerrar_parada') loadOpenRecords();
  } catch (e) {
    showMsg(action, false, e.message || 'Erro ao enviar');
  } finally {
    btn.disabled = false;
  }
}

loadOpenRecords();
</script>
</body>
</html>
